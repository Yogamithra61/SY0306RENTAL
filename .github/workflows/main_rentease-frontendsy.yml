name: Build and deploy Node.js app to Azure Web App - Rentease-frontendsy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # ✅ Clean install (fix broken dependencies)
      - name: Clean and install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ✅ Fix vite permission issue
      - name: Fix vite permission
        run: chmod +x node_modules/.bin/vite

      # ✅ Build project
      - name: Build project
        run: npm run build

      # ✅ Upload only dist (important for frontend)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5068A1C4527C4D76A7956E2473F2FA99 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_498BC0FE80E741CA915BF84A9A9EA880 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1E390B12E4994F6A83981B272732BB03 }}

      # ✅ Deploy ONLY built files
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Rentease-frontendsy'
          slot-name: 'Production'
          package: .
