name: Deploy Vite React App to Azure (FINAL FIX)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fix Vite permission
        run: chmod +x node_modules/.bin/vite

      - name: Build project
        run: npm run build

      # 🔥 VERIFY BUILD
      - name: Check dist folder
        run: |
          echo "===== DIST CONTENT ====="
          ls -la dist

      # 🔥 ZIP the dist folder properly
      - name: Zip build output
        run: |
          cd dist
          zip -r ../app.zip .

      # 🚀 DEPLOY ZIP DIRECTLY
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Rentease-frontendsy'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
