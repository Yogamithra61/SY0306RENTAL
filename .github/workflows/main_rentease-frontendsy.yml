name: Build and deploy Node.js app to Azure Web App - Rentease-frontendsy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # ✅ Clean install (fix broken dependencies)
      - name: Clean and install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # ✅ Fix vite permission issue
      - name: Fix vite permission
        run: chmod +x node_modules/.bin/vite

      # ✅ Build project
      - name: Build project
        run: npm run build

      # ✅ Upload only dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ✅ DIRECT DEPLOY using publish profile (NO LOGIN)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Rentease-frontendsy'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
